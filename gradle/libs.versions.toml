timber = { module = "com.jakewharton.timber:timber", version.ref = "timber" }

room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
room-common = {module = "androidx.room:room-common", version.ref = "room"}
room-ktx = {module = "androidx.room:room-ktx", version.ref = "room"}

[bundles]
ktor = ["ktor", "ktor-serialization", "ktor-core", "ktor-cio", "ktor-content-negotiation", "ktor-json", "ktor-kotlinx-json", "ktor-logging", "ktor-okhttp", "ktor-client-android"]

[plugins]
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
android-library = { id = "com.android.library", version.ref = "androidGradlePlugin" }
firebase-distribution = { id = "com.google.firebase.appdistribution", version.ref = "firebaseDistributionGradle"}
firebase-crashlytics = { id = "com.google.firebase.crashlytics", version.ref = "firebaseCrashlyticsGradle" }
google-services = { id = "com.google.gms.google-services", version.ref = "google-services"}
hilt-gradle = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }
kotlin-ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "serialization" }
