app-compat = { module = "androidx.appcompat:appcompat", version.ref = "appCompat" }
compose-accompanist = { module = "com.google.accompanist:accompanist-systemuicontroller", version.ref = "composeAccompanist" }
compose-animation = { module = "androidx.compose.animation:animation-graphics", version.ref = "compose" }
compose-foundation = { module = "androidx.compose.foundation:foundation", version.ref = "composeFoundation" }
